# AMD GPU Support (ROCm)
services:
  translator:
    build:
      context: .
      dockerfile: Dockerfile.amd
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    environment:
      - HSA_OVERRIDE_GFX_VERSION=12.0.0
      - AVT_OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
