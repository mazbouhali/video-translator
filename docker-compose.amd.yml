# AMD GPU Support (ROCm)
services:
  translator:
    build:
      context: .
      dockerfile: Dockerfile.amd
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    environment:
      - HSA_OVERRIDE_GFX_VERSION=12.0.0

  ollama:
    image: ollama/ollama:rocm
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    environment:
      - HSA_OVERRIDE_GFX_VERSION=12.0.0

  # Pull default model on first run
  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Checking for llama3.2 model..."
        if ! curl -s http://ollama:11434/api/tags | grep -q "llama3.2"; then
          echo "Pulling llama3.2 model (first run, ~2GB)..."
          curl -X POST http://ollama:11434/api/pull -d '{"name": "llama3.2", "stream": false}'
          echo "Done!"
        else
          echo "Model already available"
        fi
    restart: "no"
