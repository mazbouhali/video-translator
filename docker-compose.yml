# Video Translator
# 
# Usage:
#   docker compose up        # Start web UI at http://localhost:7860
#   docker compose up -d     # Start in background
#   docker compose down      # Stop
#
# Open http://localhost:7860 in your browser to translate videos!

services:
  translator:
    build: .
    container_name: video-translator
    
    # Web UI port
    ports:
      - "7860:7860"
    
    # GPU support (ignored if no NVIDIA GPU present)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    volumes:
      # Input: drop videos here (also available via web UI)
      - ./input:/app/input
      # Output: translated videos appear here  
      - ./output:/app/output
      # Models: cached between runs (saves re-downloading)
      - ./models:/app/models
      # Temp: working files
      - ./temp:/app/temp
    
    environment:
      # Translation settings
      - SOURCE_LANG=ar          # Arabic (input)
      - TARGET_LANG=en          # English (output)
      - WHISPER_MODEL=medium    # Model size: tiny/base/small/medium/large
      
      # Web UI settings
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      
      # GPU settings (auto-detected, override if needed)
      - NVIDIA_VISIBLE_DEVICES=all
    
    # Auto-restart on crash
    restart: unless-stopped
    
    # Default: launch web UI
    command: python -m app.web
