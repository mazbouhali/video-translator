# Video Translator
# 
# Usage:
#   docker compose up        # Start web UI at http://localhost:7860
#   docker compose up -d     # Start in background
#   docker compose down      # Stop

services:
  translator:
    build: .
    container_name: video-translator
    
    ports:
      - "7860:7860"
    
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./models:/app/models
      - ./temp:/app/temp
    
    environment:
      - SOURCE_LANG=ar
      - TARGET_LANG=en
      - WHISPER_MODEL=medium
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    
    restart: unless-stopped
    command: python -m app.web
