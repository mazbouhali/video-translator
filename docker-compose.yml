# Video Translator
# 
# Usage:
#   docker compose up        # Start web UI at http://localhost:7860
#   docker compose up -d     # Start in background
#   docker compose down      # Stop

services:
  translator:
    build: .
    container_name: video-translator
    
    ports:
      - "7860:7860"
    
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./models:/app/models
      - ./temp:/app/temp
    
    environment:
      - SOURCE_LANG=ar
      - TARGET_LANG=en
      - WHISPER_MODEL=medium
      - AVT_SERVER_HOST=0.0.0.0
      - AVT_SERVER_PORT=7860
      - AVT_OLLAMA_HOST=http://ollama:11434
    
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    
    restart: unless-stopped
    command: python -m app.web

  ollama:
    image: ollama/ollama:latest
    container_name: video-translator-ollama
    
    volumes:
      - ./ollama-models:/root/.ollama
    
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    
    restart: unless-stopped

  # Auto-pull the LLM model on first run
  ollama-init:
    image: curlimages/curl:latest
    container_name: video-translator-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Checking for llama3.2 model..."
        if ! curl -s http://ollama:11434/api/tags | grep -q "llama3.2"; then
          echo "Pulling llama3.2 model (first run, ~2GB download)..."
          curl -X POST http://ollama:11434/api/pull -d '{"name": "llama3.2", "stream": false}'
          echo "✓ Model ready!"
        else
          echo "✓ Model already available"
        fi
    restart: "no"
